name: FlowIntel CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm ci --prefix backend
      - run: npm ci --prefix frontend
      - run: npm run seed
      - run: npm run demo
      - run: npm run evaluate
      - run: npm run metrics
      - run: npm run verify
      - run: npm test
      - run: npm run typecheck --prefix backend
